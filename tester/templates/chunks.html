<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>IOC Autotest</title>
	<style type="text/css">
		.header {
			background-color: #ccc;
			padding: 1em;
			margin: 0em;
			border-collapse: collapse;
			font-family: 'sans-serif';
			font-weight: bold;
		}
		.userbox {
			float: right;
			font-family: 'serif';
			font-weight: normal;
		}
		#resultat[disabled] {
			color: blue;
		}
		#progressbarbox {
			display: inline-block;
			width: 240px;
			height: 1em;
			background-color: #ddd;
		}
		#progressbar {
			display: inline-block;
			width: 0;
			height: 1em;
			background-color: grey;
		}
	</style>
	<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
	<script type="text/javascript">
		function canvia_set() {
			if( parseInt($("#set").val()) )
				$("#go").prop("disabled",false);
			else
				$("#go").prop("disabled",true);
		}

		var progres = 1;
		var timer = null;
		function progressa() {
			$("#progressbar").width(progres)
			progres += 1;
		}

		function executa_set() {
			// engeguem barra de progrés
			progres = 1;
			timer = setInterval(progressa,500);
			// trobem set id
			var set_id = document.getElementById("set").value;
			console.log("Iniciant proves. Set ID="+set_id);
			processarAPINDJSON(`/api/executa_set_chunked/${set_id}`);
		}
		function neteja() {
			$("textarea").val("");
		}

		// NDJSON = NewLine Delimited JSON
		async function processarAPINDJSON(url) {
		  try {
		    const response = await fetch(url);
		    const reader = response.body
		      .pipeThrough(new TextDecoderStream())
		      .getReader();
		    
		    let buffer = '';
		    let lineCount = 0;
		    
		    while (true) {
		      const { value, done } = await reader.read();
		      if (done) break;
		      
		      buffer += value;
		      
		      // Processar línia per línia
		      const lines = buffer.split('\n');
		      buffer = lines.pop() || ''; // Última línia incompleta
		      
		      for (const line of lines) {
		        if (line.trim()) {
		          try {
		            const element = JSON.parse(line);
		            processarElementNDJSON(element, lineCount++);
		          } catch (e) {
		            console.error('Error en línia:', e);
		          }
		        }
		      }
		    }
		  } catch (error) {
		    console.error('Error:', error);
		  }
		}

		function processarElementNDJSON(element, index) {
		  // Processament NO bloquejant
		  queueMicrotask(() => {
		  	var textarea = document.getElementById("resultat");

		  	switch( element.type ) {
		  		case "cap":
		  			textarea.value += "==============================================================\n";
					textarea.value += `INTENT DE PROVES id=${element.intent_id}\n`
					textarea.value += "\tIP del client:" + element.ip + "\n"
					textarea.value += "\tSet ID:" + element.set_id + "\n"
					textarea.value += "\tUsuari:" + element.user + "\n\n"
		  			break;
		  		case "prova":
		  			textarea.value += "---------------------------------------------------------------\n";
		  			textarea.value += `PROVA ${element.index}/${element.total}: ${element.nom}\n`;
		  			textarea.value += `\tTipus de prova: ${element.tipus}\n`;
		  			textarea.value += `\tResultat: ${element.resultat}\n`;
		  			textarea.value += element.message + "\n";
		  			break;
		  		case "resum":
		  			textarea.value += "---------------------------------------------------------------\n";
		  			textarea.value += "RESUM:\n";
		  			textarea.value += `Intent id: ${element.intent_id}\n`;
		  			textarea.value += `Puntuació total: ${element.percentatge}\n`;
		  			for( const prova of element.proves ) {
		  				textarea.value += `\t${prova.index}. [${prova.resultat}] (${prova.pes} punts) ${prova.nom}\n`;
		  			}
		  			break;
		  		case "final":
		  			textarea.value += "FINAL INTENT DE PROVES\n\n"
					// fer scroll al final del textarea
					//textarea.scrollTop = textarea.scrollHeight - textarea.clientHeight;
		  			// tancar progress bar
		  			clearInterval(timer);
					progres = 0;
					progressa();
					// notificar final de proves
					setTimeout( mostra_final, 100);
		  			break;
		  	}
			// fer scroll al final del textarea
			textarea.scrollTop = textarea.scrollHeight - textarea.clientHeight;

		    console.log(`📄 Línia ${index}:`, element);
		  });
		}

		function mostra_final() {
			alert("Proves executades. Comprova els resultats.");
		}
	</script>
</head>
<body>

	<div class="header">
		Proves de missatges chunked
		<span class="userbox">proves</span>
	</div>

	<p>Selecciona un set de proves a executar:</p>
	<select id="set" onchange="canvia_set()">
		<option>Selecciona un set de proves a executar...</option>
		{% for set in sets %}
			<option value="{{set.id}}">{{set}}</option>
		{% endfor %}
	</select>

	<button disabled id="go" onclick="executa_set()">Executa el set de proves</button>

	<button onclick="neteja()">Neteja</button>
	<span id="progressbarbox">
		<span id="progressbar"></span>
	</span>

	<br>

	<div id="missatges"></div>

	<h2>Resultat de les proves</h2>
	<textarea style="width:100%" cols="80" rows="25" id="resultat" disabled></textarea>


</body>
</html>
